services:
  - type: web
    name: quick-fresh-app
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DB_PATH
        value: /var/data/db.json
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: quick-fresh-data
      mountPath: /var/data
      sizeGB: 1
